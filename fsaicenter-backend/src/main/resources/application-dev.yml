# 开发环境配置
spring:
  datasource:
    url: jdbc:postgresql://localhost:5000/fsaicenter_dev?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres

  data:
    redis:
      host: localhost
      port: 5001
      password:
      database: 0

  redisson:
    config: |
      singleServerConfig:
        address: "redis://localhost:5001"
        database: 0
        connectionPoolSize: 20
        connectionMinimumIdleSize: 5
        timeout: 5000
        connectTimeout: 10000
        idleConnectionTimeout: 10000

# 日志配置
logging:
  level:
    root: INFO
    com.fsa.aicenter: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.redis: DEBUG
    com.baomidou.mybatisplus: DEBUG

# Knife4j配置
knife4j:
  enable: true
  production: false

# 服务器配置
server:
  port: 5080
