# 开发环境配置
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fsaicenter_dev?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

# 日志配置
logging:
  level:
    root: INFO
    com.fsa.aicenter: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.redis: DEBUG
    com.baomidou.mybatisplus: DEBUG

# Knife4j配置
knife4j:
  enable: true
  production: false

# 服务器配置
server:
  port: 8080
