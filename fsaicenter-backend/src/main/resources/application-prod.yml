# 生产环境配置
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&ssl=true&sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10

# 日志配置
logging:
  level:
    root: WARN
    com.fsa.aicenter: INFO
    org.springframework.web: WARN
    org.springframework.data.redis: WARN
    com.baomidou.mybatisplus: WARN
  file:
    name: /var/log/fsaicenter/application.log
    max-size: 500MB
    max-history: 60

# Knife4j配置（生产环境关闭）
knife4j:
  enable: false
  production: true

# 服务器配置
server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 500
      min-spare: 50
